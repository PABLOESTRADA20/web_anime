name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://szcpihgltvewnlrzydpe.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'sb_publishable_Xbz5cUzCE7umS3y6GaGOtw_gRNmiLgz' }}
          VITE_ANIVEXA_URL: ${{ secrets.VITE_ANIVEXA_URL || 'https://anivexa-api.vercel.app' }}
          VITE_CONSUMET_URL: ${{ secrets.VITE_CONSUMET_URL || 'https://consumet-api-production-3333.up.railway.app' }}

      - name: Install wrangler
        run: npm install wrangler@latest

      - name: Deploy to Cloudflare Pages
        run: |
          API_TOKEN=$(echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | tr -d '[:space:]')
          echo "Token length: ${#API_TOKEN}"
          CLOUDFLARE_API_TOKEN="$API_TOKEN" npx wrangler pages deploy dist --project-name anime-app --branch main 2>&1
